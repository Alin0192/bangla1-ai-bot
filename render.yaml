services:
  - type: web
    name: banglabot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: SPAM_BAN_THRESHOLD
        value: "3"
      - key: BADWORD_WARN_LIMIT
        value: "3"
